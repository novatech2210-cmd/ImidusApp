name: Android APK Build

on:
  push:
    branches: [main, feature/*, develop]
    paths:
      - "src/mobile/ImidusCustomerApp/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/mobile/ImidusCustomerApp/**"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type (debug/release)"
        required: true
        default: "release"
        type: choice
        options:
          - debug
          - release
      upload_to_s3:
        description: "Upload to S3 after build"
        required: false
        default: false
        type: boolean

env:
  WORKING_DIR: src/mobile/ImidusCustomerApp
  JAVA_VERSION: "17"
  NODE_VERSION: "18"
  S3_BUCKET: inirestaurant
  S3_PREFIX: novatech

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        working-directory: ${{ env.WORKING_DIR }}/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/imidus-release.keystore
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "storeFile=imidus-release.keystore" >> keystore.properties

      - name: Make gradlew executable
        working-directory: ${{ env.WORKING_DIR }}/android
        run: chmod +x gradlew

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        working-directory: ${{ env.WORKING_DIR }}/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: ${{ env.WORKING_DIR }}/android
        run: ./gradlew assembleDebug --no-daemon

      - name: List APK files
        working-directory: ${{ env.WORKING_DIR }}/android
        run: |
          echo "Release APKs:"
          find app/build/outputs/apk/release -name "*.apk" 2>/dev/null || echo "No release APKs"
          echo "Debug APKs:"
          find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null || echo "No debug APKs"

      - name: Upload Release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: imidus-customer-app-release
          path: ${{ env.WORKING_DIR }}/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: imidus-customer-app-debug
          path: ${{ env.WORKING_DIR }}/android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Create Release (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.WORKING_DIR }}/android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true

      - name: Extract version from package.json
        id: version
        if: ${{ github.event.inputs.upload_to_s3 == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          VERSION=$(jq -r '.version' package.json)
          # Use tag name if available, otherwise construct from package.json
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v${VERSION}"
          fi
          echo "app_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create version.json manifest
        if: ${{ github.event.inputs.upload_to_s3 == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        working-directory: ${{ env.WORKING_DIR }}/android
        run: |
          cat > version.json <<EOF
          {
            "platform": "android",
            "app_version": "${{ steps.version.outputs.app_version }}",
            "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "commit_short": "${{ steps.version.outputs.commit_short }}",
            "branch": "${{ github.ref_name }}",
            "build_number": "${{ github.run_number }}",
            "build_id": "${{ github.run_id }}",
            "testflight_status": "not_applicable"
          }
          EOF

      - name: Configure AWS credentials
        if: ${{ github.event.inputs.upload_to_s3 == 'true' || startsWith(github.ref, 'refs/tags/v') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload APK to S3
        if: |
          (github.event.inputs.upload_to_s3 == 'true' || startsWith(github.ref, 'refs/tags/v')) &&
          github.event.inputs.build_type != 'debug'
        working-directory: ${{ env.WORKING_DIR }}/android
        run: |
          APP_VERSION="${{ steps.version.outputs.app_version }}"
          S3_PATH="s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/mobile/android/v${APP_VERSION}/"

          # Upload APK
          aws s3 cp app/build/outputs/apk/release/*.apk \
            "${S3_PATH}" \
            --acl public-read

          # Upload version manifest
          aws s3 cp version.json \
            "${S3_PATH}version.json" \
            --acl public-read \
            --content-type application/json

          echo "Android build uploaded to S3"
          echo "Path: ${S3_PATH}"

      - name: Cleanup keystore
        if: always()
        working-directory: ${{ env.WORKING_DIR }}/android
        run: |
          rm -f app/imidus-release.keystore
          rm -f keystore.properties
