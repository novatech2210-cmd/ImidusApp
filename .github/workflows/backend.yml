name: Backend CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/backend/**'
      - 'deployment/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOTNET_VERSION: '9.0.x'
  CONFIGURATION: 'Release'
  AWS_REGION: 'us-east-1'

jobs:
  # ============================================================================
  # BUILD & TEST
  # ============================================================================
  build-and-test:
    name: Build & Test Backend
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/backend/IntegrationService.API/IntegrationService.API.csproj

      - name: Build
        run: dotnet build src/backend/IntegrationService.API/IntegrationService.API.csproj --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Run tests
        run: dotnet test src/backend/IntegrationService.Tests/IntegrationService.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal

      - name: Publish
        run: |
          dotnet publish src/backend/IntegrationService.API/IntegrationService.API.csproj \
            --configuration ${{ env.CONFIGURATION }} \
            --output ./publish \
            --self-contained true \
            -r win-x64

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ./publish
          retention-days: 30

  # ============================================================================
  # BUILD MSI INSTALLER
  # ============================================================================
  build-msi:
    name: Build MSI Installer
    runs-on: windows-latest
    needs: build-and-test
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./publish

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 4.0.4
          wix extension add -g WixToolset.UI.wixext

      - name: Build MSI
        run: |
          cd deployment/installer
          wix build -o ../../dist/ImidusPOSIntegration-Setup.msi ImidusInstaller.wxs
        env:
          PRODUCT_VERSION: ${{ github.run_number }}

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: msi-installer
          path: ./dist/ImidusPOSIntegration-Setup.msi
          retention-days: 90

  # ============================================================================
  # DEPLOY TO S3
  # ============================================================================
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: [build-and-test, build-msi]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ./publish

      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: msi-installer
          path: ./dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          # Create versioned release folder
          VERSION=$(date +%Y%m%d)-${{ github.run_number }}
          echo "Deploying version: $VERSION"
          
          # Upload MSI installer
          aws s3 cp ./dist/ImidusPOSIntegration-Setup.msi \
            s3://${{ secrets.AWS_S3_BUCKET }}/releases/backend/$VERSION/ImidusPOSIntegration-Setup.msi
          
          # Upload portable build
          cd publish
          zip -r ../ImidusPOSIntegration-Portable.zip .
          aws s3 cp ../ImidusPOSIntegration-Portable.zip \
            s3://${{ secrets.AWS_S3_BUCKET }}/releases/backend/$VERSION/ImidusPOSIntegration-Portable.zip
          
          # Update 'latest' symlink
          echo "$VERSION" > ../latest.txt
          aws s3 cp ../latest.txt s3://${{ secrets.AWS_S3_BUCKET }}/releases/backend/latest.txt
          
          echo "Deployment complete!"
          echo "MSI: s3://${{ secrets.AWS_S3_BUCKET }}/releases/backend/$VERSION/ImidusPOSIntegration-Setup.msi"
          echo "ZIP: s3://${{ secrets.AWS_S3_BUCKET }}/releases/backend/$VERSION/ImidusPOSIntegration-Portable.zip"

      - name: Generate deployment report
        run: |
          cat > deployment-report.md <<EOF
          # Backend Deployment Report
          
          **Version:** $(date +%Y%m%d)-${{ github.run_number }}
          **Date:** $(date)
          **Environment:** ${{ github.event.inputs.environment || 'staging' }}
          **Commit:** ${{ github.sha }}
          
          ## Artifacts
          
          - **MSI Installer:** s3://${{ secrets.AWS_S3_BUCKET }}/releases/backend/$(date +%Y%m%d)-${{ github.run_number }}/ImidusPOSIntegration-Setup.msi
          - **Portable ZIP:** s3://${{ secrets.AWS_S3_BUCKET }}/releases/backend/$(date +%Y%m%d)-${{ github.run_number }}/ImidusPOSIntegration-Portable.zip
          
          ## Installation
          
          ### Option 1: MSI Installer (Recommended)
          Download and run the MSI installer on the Windows Server. It will:
          - Install the backend service
          - Configure Windows Service
          - Set up firewall rules
          - Create start menu shortcuts
          
          ### Option 2: Portable ZIP
          Extract and run directly:
          \`\`\`powershell
          ./IntegrationService.API.exe
          \`\`\`
          
          ## Configuration Required
          
          Update the following in \`appsettings.json\`:
          - POS Database connection string
          - Authorize.net credentials (production)
          - Firebase credentials
          - JWT secret
          
          EOF
          
          aws s3 cp deployment-report.md s3://${{ secrets.AWS_S3_BUCKET }}/releases/backend/$(date +%Y%m%d)-${{ github.run_number }}/README.md

  # ============================================================================
  # NOTIFY
  # ============================================================================
  notify:
    name: Notify Deployment
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Notify success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Backend deployment successful!"
          echo "Version: $(date +%Y%m%d)-${{ github.run_number }}"
          echo "S3 Bucket: s3://${{ secrets.AWS_S3_BUCKET }}/releases/backend/"

      - name: Notify failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Backend deployment failed"
          exit 1
