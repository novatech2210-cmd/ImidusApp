name: Backend CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
    paths:
      - "src/backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"
  workflow_dispatch:
    inputs:
      build_msi:
        description: "Build MSI installer"
        required: true
        default: true
        type: boolean
      upload_to_s3:
        description: "Upload artifacts to S3"
        required: true
        default: true
        type: boolean
      environment:
        description: "Deployment environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  BACKEND_DIR: src/backend
  DOTNET_VERSION: "9.0.x"
  CONFIGURATION: "Release"
  S3_BUCKET: inirestaurant
  S3_PREFIX: novatech
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # BUILD & TEST
  # ============================================================================
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: dotnet restore

      - name: Build API
        working-directory: ${{ env.BACKEND_DIR }}/IntegrationService.API
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Run tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal

      - name: Publish API
        working-directory: ${{ env.BACKEND_DIR }}/IntegrationService.API
        run: |
          dotnet publish --configuration ${{ env.CONFIGURATION }} \
            --output ./publish \
            --self-contained true \
            --runtime win-x64 \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-api
          path: ${{ env.BACKEND_DIR }}/IntegrationService.API/publish/
          retention-days: 30

  # ============================================================================
  # BUILD MSI INSTALLER
  # ============================================================================
  build-msi:
    name: Build MSI Installer
    runs-on: windows-latest
    needs: build-and-test
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_msi != 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-api
          path: ./api-publish

      - name: Setup WiX Toolset
        run: |
          dotnet tool install --global wix
          wix extension add -g WixToolset.UI.wixext

      - name: Create MSI with WiX
        working-directory: ./installer
        run: |
          wix build -o ../artifacts/ImidusIntegrationService.msi \
            -p:Configuration=Release \
            -p:Platform=x64 \
            -d:PublishDir=../api-publish

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-msi
          path: ./artifacts/*.msi
          retention-days: 90

      - name: Create version info
        run: |
          echo "Version: ${{ github.ref_name }}" > ./version.txt
          echo "Build Date: $(date)" >> ./version.txt
          echo "Commit: ${{ github.sha }}" >> ./version.txt

      - name: Upload version artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: ./version.txt

  # ============================================================================
  # DEPLOY TO AWS S3
  # ============================================================================
  deploy-to-s3:
    name: Deploy to AWS S3
    runs-on: ubuntu-latest
    needs: [build-and-test, build-msi]
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event.inputs.upload_to_s3 == 'true' }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload to S3
        run: |
          VERSION=${{ github.ref_name }}
          if [[ $VERSION != v* ]]; then
            VERSION=$(date +%Y%m%d)-${{ github.run_number }}
          fi
          echo "Deploying version: $VERSION"

          # Upload API
          aws s3 sync ./artifacts/backend-api/ \
            s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/$VERSION/api/ --delete

          # Upload MSI if exists
          if [ -d ./artifacts/backend-msi ]; then
            aws s3 cp ./artifacts/backend-msi/*.msi \
              s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/$VERSION/
          fi

          # Upload version info
          if [ -f ./artifacts/version-info/version.txt ]; then
            aws s3 cp ./artifacts/version-info/version.txt \
              s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/$VERSION/version.txt
          fi

          # Update latest pointer
          echo "$VERSION" > latest.txt
          aws s3 cp latest.txt s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/latest.txt

      - name: Notify deployment
        run: |
          VERSION=${{ github.ref_name }}
          echo "✅ Backend deployed successfully!"
          echo "S3 Path: s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/$VERSION/"
