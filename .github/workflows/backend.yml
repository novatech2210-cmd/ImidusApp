name: Backend CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - "v*"
    paths:
      - "src/backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"
  workflow_dispatch:
    inputs:
      build_msi:
        description: "Build MSI installer"
        required: true
        default: true
        type: boolean
      upload_to_s3:
        description: "Upload artifacts to S3"
        required: true
        default: true
        type: boolean
      environment:
        description: "Deployment environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  BACKEND_DIR: src/backend
  DOTNET_VERSION: "9.0.x"
  CONFIGURATION: "Release"
  S3_BUCKET: inirestaurant
  S3_PREFIX: novatech
  AWS_REGION: us-east-1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_AUTHOR_NAME: novatech
  GIT_AUTHOR_EMAIL: novatech2210@gmail.com
  GIT_COMMITTER_NAME: novatech
  GIT_COMMITTER_EMAIL: novatech2210@gmail.com
  GPG_KEY_ID: 46D53BDC28352FF7

jobs:
  # ============================================================================
  # BUILD & TEST
  # ============================================================================
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git Identity
        run: |
          git config --global user.name "${{ env.GIT_AUTHOR_NAME }}"
          git config --global user.email "${{ env.GIT_AUTHOR_EMAIL }}"
          git config --global commit.gpgsign true
          git config --global user.signingkey "${{ env.GPG_KEY_ID }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: dotnet restore

      - name: Build API
        working-directory: ${{ env.BACKEND_DIR }}/IntegrationService.API
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Run tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal

      - name: Publish API
        working-directory: ${{ env.BACKEND_DIR }}/IntegrationService.API
        run: |
          dotnet publish --configuration ${{ env.CONFIGURATION }} \
            --output ./publish \
            --self-contained true \
            --runtime win-x64 \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-api
          path: ${{ env.BACKEND_DIR }}/IntegrationService.API/publish/
          retention-days: 30
