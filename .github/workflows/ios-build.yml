name: iOS Build
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  WORKING_DIR: src/mobile/ImidusCustomerApp

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # Check if workspace exists at root
      - name: Determine install location
        id: install-location
        run: |
          if [ -f "pnpm-workspace.yaml" ]; then
            echo "Installing from root (workspace mode)"
            echo "install_dir=." >> $GITHUB_OUTPUT
          else
            echo "Installing from app directory (standalone mode)"
            echo "install_dir=${{ env.WORKING_DIR }}" >> $GITHUB_OUTPUT
          fi

      # Install dependencies from correct location
      - name: Install dependencies
        working-directory: ${{ steps.install-location.outputs.install_dir }}
        run: |
          echo "Installing from: $(pwd)"
          pnpm install --frozen-lockfile

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: ${{ env.WORKING_DIR }}/ios
          bundler-cache: true

      # Verify before pod install
      - name: Verify React Native
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if [ -f "node_modules/react-native/scripts/react_native_pods.rb" ]; then
            echo "✅ React Native found"
          else
            echo "❌ React Native NOT found"
            exit 1
          fi

      - name: Install CocoaPods
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: bundle exec pod install --repo-update

      # ... rest of build steps
