name: iOS Build
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: src/mobile/ImidusCustomerApp

      - name: Install CocoaPods
        run: npx pod-install ios
        working-directory: src/mobile/ImidusCustomerApp

      - name: Build Archive
        run: |
          xcodebuild archive \
            -workspace ios/ImidusCustomerApp.xcworkspace \
            -scheme ImidusCustomerApp \
            -archivePath build/ImidusCustomerApp.xcarchive \
            -allowProvisioningUpdates
        working-directory: src/mobile/ImidusCustomerApp

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ImidusCustomerApp.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist ios/ExportOptions.plist
        working-directory: src/mobile/ImidusCustomerApp

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImidusCustomerApp-iOS
          path: src/mobile/ImidusCustomerApp/build/ImidusCustomerApp.ipa
          retention-days: 7

      - name: Upload to S3
        run: |
          aws s3 cp build/ImidusCustomerApp.ipa s3://inirestaurant/novatech/mobile/ios/ImidusCustomerApp.ipa
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
