name: iOS Build
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  WORKING_DIR: src/mobile/ImidusCustomerApp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ios:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        working-directory: ${{ env.WORKING_DIR }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: ${{ env.WORKING_DIR }}/ios
          bundler-cache: true

      - name: Install CocoaPods
        run: bundle exec pod install --repo-update
        working-directory: ${{ env.WORKING_DIR }}/ios

      - name: Import Apple Certificates
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Import Provisioning Profile
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PP_PATH"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH/profile.mobileprovision"

      - name: Build Archive & Export IPA
        run: bundle exec fastlane build_production
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImidusCustomerApp-iOS
          path: ${{ env.WORKING_DIR }}/ios/build/ImidusCustomerApp.ipa
          retention-days: 7

      - name: Upload to S3
        run: |
          aws s3 cp ios/build/ImidusCustomerApp.ipa s3://inirestaurant/novatech/mobile/ios/ImidusCustomerApp.ipa
        working-directory: ${{ env.WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
