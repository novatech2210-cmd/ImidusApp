name: iOS Build
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  WORKING_DIR: src/mobile/ImidusCustomerApp
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60
    
    steps:
      # 1. Checkout
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # 3. Setup pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 4. Get pnpm store directory
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # 5. Cache pnpm dependencies
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # 6. Install Node dependencies
      - name: Install Node dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm install --frozen-lockfile

      # 7. Setup Ruby
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          working-directory: ${{ env.WORKING_DIR }}/ios
          bundler-cache: true

      # 8. Cache CocoaPods
      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ${{ env.WORKING_DIR }}/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # 9. Install CocoaPods dependencies
      - name: Install CocoaPods
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: bundle exec pod install --repo-update

      # 10. Import Apple Certificates
      - name: Import Apple Certificates
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # 11. Import Provisioning Profile
      - name: Import Provisioning Profile
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PP_PATH"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH/profile.mobileprovision"

      # 12. Build Archive & Export IPA
      - name: Build Archive & Export IPA
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
        run: bundle exec fastlane build_production

      # 13. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImidusCustomerApp-iOS
          path: ${{ env.WORKING_DIR }}/ios/build/ImidusCustomerApp.ipa
          retention-days: 7

      # 14. Upload to S3
      - name: Upload to S3
        working-directory: ${{ env.WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          aws s3 cp ios/build/ImidusCustomerApp.ipa \
            s3://inirestaurant/novatech/mobile/ios/ImidusCustomerApp.ipa

      # 15. Cleanup Keychain
      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
