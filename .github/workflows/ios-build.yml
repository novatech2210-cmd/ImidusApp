name: iOS Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  WORKING_DIR: src/mobile/ImidusCustomerApp

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "=== Installing dependencies ==="
          npm install

          echo "=== Verifying react-native-svg version ==="
          grep '"react-native-svg"' package.json

          echo "=== Verifying React Native ==="
          ls -lh node_modules/react-native/scripts/react_native_pods.rb

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ${{ env.WORKING_DIR }}/ios

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: bundle exec pod install --repo-update

      - name: Import Apple Certificates
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Import Provisioning Profile
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_PATH"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH/profile.mobileprovision"

      - name: Build Archive & Export IPA
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 180
          CI: true
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane build_production

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImidusCustomerApp-iOS-${{ github.ref_name }}
          path: ${{ env.WORKING_DIR }}/ios/build/ImidusCustomerApp.ipa
          retention-days: 7
          compression-level: 0

      - name: Upload to S3
        working-directory: ${{ env.WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          FILENAME="ImidusCustomerApp-${{ github.ref_name }}.ipa"
          aws s3 cp ios/build/ImidusCustomerApp.ipa \
            "s3://inirestaurant/novatech/mobile/ios/$FILENAME"

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
