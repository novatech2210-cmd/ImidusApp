# Create/update the workflow
cat > .github/workflows/ios-build.yml << 'EOF'
name: iOS Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  WORKING_DIR: src/mobile/ImidusCustomerApp

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Force fresh install - no cache
      - name: Clean and install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "=== Cleaning old installations ==="
          rm -rf node_modules
          
          echo "=== Installing dependencies ==="
          pnpm install --frozen-lockfile
          
          echo "=== Verifying react-native-svg version ==="
          grep '"react-native-svg"' package.json || echo "ERROR: react-native-svg not found"
          
          echo "=== Verifying React Native installation ==="
          if [ -f "node_modules/react-native/scripts/react_native_pods.rb" ]; then
            echo "✅ react_native_pods.rb found"
            ls -lh node_modules/react-native/scripts/react_native_pods.rb
          else
            echo "❌ react_native_pods.rb NOT FOUND"
            exit 1
          fi
          
          echo "=== Checking react-native-svg in node_modules ==="
          ls -la node_modules/react-native-svg/package.json
          grep '"version"' node_modules/react-native-svg/package.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ${{ env.WORKING_DIR }}/ios

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: |
          echo "=== Installing CocoaPods ==="
          bundle exec pod install --repo-update --verbose
          
          echo "=== CocoaPods installation complete ==="

      - name: Import Apple Certificates
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Import Provisioning Profile
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_PATH"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH/profile.mobileprovision"

      - name: Build Archive & Export IPA
        working-directory: ${{ env.WORKING_DIR }}/ios
        env:
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 180
          CI: true
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "=== Starting Fastlane build ==="
          bundle exec fastlane build_production

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImidusCustomerApp-iOS-${{ github.ref_name }}
          path: ${{ env.WORKING_DIR }}/ios/build/ImidusCustomerApp.ipa
          retention-days: 7
          compression-level: 0

      - name: Upload to S3
        working-directory: ${{ env.WORKING_DIR }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: |
          FILENAME="ImidusCustomerApp-${{ github.ref_name }}.ipa"
          S3_PATH="s3://inirestaurant/novatech/mobile/ios/$FILENAME"
          
          aws s3 cp ios/build/ImidusCustomerApp.ipa "$S3_PATH" \
            --metadata "git-tag=${{ github.ref_name }},commit=${{ github.sha }}"
          
          echo "✅ IPA uploaded to S3"

      - name: Cleanup Keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
EOF

# Commit
git add .github/workflows/ios-build.yml
git commit -m "fix: force fresh npm install without cache for iOS build"
git push origin main
