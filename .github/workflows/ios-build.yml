name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'src/mobile/ImidusCustomerApp/**'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight'
        required: true
        default: true
        type: boolean
      upload_to_s3:
        description: 'Upload IPA to S3'
        required: false
        default: false
        type: boolean

env:
  WORKING_DIR: src/mobile/ImidusCustomerApp
  NODE_VERSION: '18'
  S3_BUCKET: inirestaurant
  S3_PREFIX: novatech

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/yarn.lock

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Install CocoaPods dependencies
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: pod install

      - name: Setup Ruby for Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Import signing certificate
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$P12_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Import provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create directory for provisioning profiles
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles

          # Decode and install profile
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build iOS app
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: |
          xcodebuild -workspace ImidusCustomerApp.xcworkspace \
            -scheme ImidusCustomerApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/ImidusCustomerApp.xcarchive \
            archive

      - name: Export IPA
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/ImidusCustomerApp.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $PWD/build

      - name: Upload to TestFlight
        if: ${{ github.event.inputs.upload_to_testflight != 'false' }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        working-directory: ${{ env.WORKING_DIR }}/ios
        run: |
          # Decode API key
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > AuthKey.p8

          # Upload to TestFlight using Fastlane
          fastlane pilot upload \
            --api_key_path AuthKey.p8 \
            --skip_waiting_for_build_processing \
            --ipa build/ImidusCustomerApp.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: imidus-customer-app-ios
          path: ${{ env.WORKING_DIR }}/ios/build/*.ipa
          retention-days: 30

       - name: Extract version from package.json
         id: version
         if: ${{ github.event.inputs.upload_to_s3 == 'true' }}
         working-directory: ${{ env.WORKING_DIR }}
         run: |
           VERSION=$(jq -r '.version' package.json)
           # Use tag name if available, otherwise construct from package.json
           if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
             VERSION="${{ github.ref_name }}"
           else
             VERSION="v${VERSION}"
           fi
           echo "app_version=${VERSION}" >> $GITHUB_OUTPUT
           echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

       - name: Create version.json manifest
         if: ${{ github.event.inputs.upload_to_s3 == 'true' }}
         working-directory: ${{ env.WORKING_DIR }}/ios
         run: |
           # Extract iOS SDK version and min deployment target from Podfile
           MIN_IOS_VERSION=$(grep -m1 "platform :ios" Podfile | grep -oE "[0-9]+\.[0-9]+" | head -1 || echo "14.0")
           
           cat > version.json <<EOF
           {
             "platform": "ios",
             "app_version": "${{ steps.version.outputs.app_version }}",
             "build_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
             "commit": "${{ github.sha }}",
             "commit_short": "${{ steps.version.outputs.commit_short }}",
             "branch": "${{ github.ref_name }}",
             "build_number": "${{ github.run_number }}",
             "build_id": "${{ github.run_id }}",
             "min_ios_version": "${MIN_IOS_VERSION}",
             "testflight_status": "submitted"
           }
           EOF

       - name: Configure AWS credentials
         if: ${{ github.event.inputs.upload_to_s3 == 'true' }}
         uses: aws-actions/configure-aws-credentials@v4
         with:
           aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
           aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
           aws-region: us-east-1

       - name: Upload IPA to S3
         if: ${{ github.event.inputs.upload_to_s3 == 'true' }}
         working-directory: ${{ env.WORKING_DIR }}/ios
         run: |
           APP_VERSION="${{ steps.version.outputs.app_version }}"
           S3_PATH="s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/mobile/ios/v${APP_VERSION}/"
           
           # Upload IPA
           aws s3 cp build/*.ipa \
             "${S3_PATH}" \
             --acl public-read
           
           # Upload dSYM for crash reporting
           if [ -d "build/ImidusCustomerApp.xcarchive/dSYMs" ]; then
             zip -r build/ImidusCustomerApp.dSYM.zip build/ImidusCustomerApp.xcarchive/dSYMs
             aws s3 cp build/ImidusCustomerApp.dSYM.zip \
               "${S3_PATH}ImidusCustomerApp.dSYM.zip" \
               --acl public-read
           fi
           
           # Upload version manifest
           aws s3 cp version.json \
             "${S3_PATH}version.json" \
             --acl public-read \
             --content-type application/json
           
           echo "✅ iOS build uploaded to S3"
           echo "Path: ${S3_PATH}"

       - name: Cleanup keychain
         if: always()
         run: security delete-keychain build.keychain || true
       
       - name: Cleanup sensitive files
         if: always()
         working-directory: ${{ env.WORKING_DIR }}/ios
         run: |
           rm -f certificate.p12
           rm -f AuthKey.p8
           rm -f ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
