name: Mobile CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "src/mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/mobile/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: "17"
  RUBY_VERSION: "3.0"

jobs:
  # ============================================================================
  # LINT & TEST
  # ============================================================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test -- --coverage --watchAll=false

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: src/mobile/coverage/lcov.info
          flags: mobile
          name: mobile-coverage

  # ============================================================================
  # BUILD ANDROID
  # ============================================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: src/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      - name: Install dependencies
        run: npm ci

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.0

      - name: Generate release keystore (staging)
        if: github.event.inputs.environment != 'production'
        run: |
          mkdir -p android/app
          keytool -genkey -v -keystore android/app/debug.keystore \
            -alias androiddebugkey -keypass android -storepass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Decode release keystore (production)
        if: github.event.inputs.environment == 'production'
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APK (Staging)
        if: github.event.inputs.environment != 'production'
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build AAB (Production)
        if: github.event.inputs.environment == 'production'
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload APK Artifact
        if: github.event.inputs.environment != 'production'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-staging
          path: src/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload AAB Artifact
        if: github.event.inputs.environment == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-production
          path: src/mobile/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Deploy to S3 (Staging)
        if: github.event.inputs.environment != 'production'
        run: |
          aws s3 cp android/app/build/outputs/apk/debug/app-debug.apk \
            s3://${{ secrets.AWS_S3_BUCKET }}/mobile/android/imidus-customer-app-staging.apk
          echo "APK uploaded to S3: s3://${{ secrets.AWS_S3_BUCKET }}/mobile/android/imidus-customer-app-staging.apk"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  # ============================================================================
  # BUILD IOS
  # ============================================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: src/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: src/mobile/package-lock.json

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: src/mobile/ios

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          bundle install
          pod install

      - name: Setup signing (Staging)
        if: github.event.inputs.environment != 'production'
        run: |
          cd ios
          mkdir -p certs
          # Use debug signing for staging
          echo "Using automatic signing for staging build"

      - name: Setup signing (Production)
        if: github.event.inputs.environment == 'production'
        run: |
          cd ios
          # Decode certificates and provisioning profiles
          echo "${{ secrets.IOS_CERTIFICATE_BASE64 }}" | base64 -d > certs/distribution.p12
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > certs/AppStore.mobileprovision

          # Create keychain
          security create-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          security unlock-keychain -p "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          security import certs/distribution.p12 -k build.keychain -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp certs/AppStore.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA (Staging)
        if: github.event.inputs.environment != 'production'
        run: |
          cd ios
          xcodebuild -workspace ImidusCustomerApp.xcworkspace \
            -scheme ImidusCustomerApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            clean build

      - name: Build IPA (Production)
        if: github.event.inputs.environment == 'production'
        run: |
          cd ios
          xcodebuild -workspace ImidusCustomerApp.xcworkspace \
            -scheme ImidusCustomerApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ImidusCustomerApp.xcarchive \
            clean archive

          xcodebuild -exportArchive \
            -archivePath build/ImidusCustomerApp.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath build/output

      - name: Upload IPA Artifact
        if: github.event.inputs.environment == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-production
          path: src/mobile/ios/build/output/*.ipa
          retention-days: 30

      - name: Deploy to S3 (Production)
        if: github.event.inputs.environment == 'production'
        run: |
          aws s3 cp ios/build/output/*.ipa \
            s3://${{ secrets.AWS_S3_BUCKET }}/mobile/ios/
          echo "IPA uploaded to S3"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

  # ============================================================================
  # NOTIFICATION
  # ============================================================================
  notify:
    name: Notify Completion
    needs: [build-android, build-ios]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Notify success
        if: needs.build-android.result == 'success' && needs.build-ios.result == 'success'
        run: |
          echo "✅ Mobile builds completed successfully!"
          echo "Android APK: s3://${{ secrets.AWS_S3_BUCKET }}/mobile/android/imidus-customer-app-staging.apk"

      - name: Notify failure
        if: needs.build-android.result == 'failure' || needs.build-ios.result == 'failure'
        run: |
          echo "❌ Mobile builds failed"
          exit 1
