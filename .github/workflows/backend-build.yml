name: Backend .NET Build & MSI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/backend/**'
  workflow_dispatch:
    inputs:
      build_msi:
        description: 'Build MSI installer'
        required: true
        default: true
        type: boolean
      upload_to_s3:
        description: 'Upload artifacts to S3'
        required: true
        default: false
        type: boolean

env:
  BACKEND_DIR: src/backend
  DOTNET_VERSION: '8.0.x'
  S3_BUCKET: inirestaurant
  S3_PREFIX: novatech

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: YourStrong@Passw0rd
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        working-directory: ${{ env.BACKEND_DIR }}
        run: dotnet restore

      - name: Build API
        working-directory: ${{ env.BACKEND_DIR }}/IntegrationService.API
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        working-directory: ${{ env.BACKEND_DIR }}
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish API
        working-directory: ${{ env.BACKEND_DIR }}/IntegrationService.API
        run: |
          dotnet publish --configuration Release \
            --output ./publish \
            --self-contained true \
            --runtime win-x64 \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-api
          path: ${{ env.BACKEND_DIR }}/IntegrationService.API/publish/
          retention-days: 30

  build-msi:
    name: Build MSI Installer
    runs-on: windows-latest
    needs: build-and-test
    if: ${{ github.event.inputs.build_msi != 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-api
          path: ./api-publish

      - name: Setup WiX Toolset
        run: |
          dotnet tool install --global wix
          wix extension add -g WixToolset.UI.wixext

      - name: Create MSI with WiX
        working-directory: ./installer
        run: |
          # Build MSI using WiX v4
          wix build -o ../artifacts/ImidusIntegrationService.msi \
            -p:Configuration=Release \
            -p:Platform=x64 \
            -d:PublishDir=../api-publish

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-msi
          path: ./artifacts/*.msi
          retention-days: 90

      - name: Create version info
        run: |
          echo "Version: ${{ github.ref_name }}" > ./artifacts/version.txt
          echo "Build Date: $(date)" >> ./artifacts/version.txt
          echo "Commit: ${{ github.sha }}" >> ./artifacts/version.txt

  deploy-to-s3:
    name: Deploy to AWS S3
    runs-on: ubuntu-latest
    needs: [build-and-test, build-msi]
    if: ${{ github.event.inputs.upload_to_s3 == 'true' }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          # Upload API files
          aws s3 sync ./artifacts/backend-api/ \
            s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/${{ github.ref_name }}/api/ \
            --delete

          # Upload MSI
          aws s3 cp ./artifacts/backend-msi/*.msi \
            s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/${{ github.ref_name }}/

          # Upload version info
          aws s3 cp ./artifacts/backend-msi/version.txt \
            s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/${{ github.ref_name }}/version.txt

      - name: Create deployment manifest
        run: |
          cat > deployment.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "artifacts": {
              "msi": "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/${{ github.ref_name }}/ImidusIntegrationService.msi",
              "api": "s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/${{ github.ref_name }}/api/"
            }
          }
          EOF
          aws s3 cp deployment.json \
            s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/${{ github.ref_name }}/deployment.json

      - name: Notify success
        run: |
          echo "✅ Backend deployed to S3"
          echo "MSI: s3://${{ env.S3_BUCKET }}/${{ env.S3_PREFIX }}/backend/${{ github.ref_name }}/ImidusIntegrationService.msi"
