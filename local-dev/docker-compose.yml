version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: imidus-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD:-YourStrong@Passw0rd}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./db/backups:/var/opt/mssql/backup
      - ./db/migrations:/var/opt/mssql/migrations
      - ./scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/1433"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - imidus-network

  api:
    build:
      context: ../src/backend
      dockerfile: IntegrationService.API/Dockerfile
    container_name: imidus-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__PosDatabase=Server=sqlserver;Database=INI_Restaurant;User Id=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;
      - ConnectionStrings__IntegrationDatabase=Server=sqlserver;Database=IntegrationService;User Id=sa;Password=${SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;
      - AuthorizeNet__Environment=Sandbox
      - AuthorizeNet__ApiLoginId=9JQVwben66U7
      - AuthorizeNet__TransactionKey=7eqvzKDRR5Q38898
      - AuthorizeNet__PublicClientKey=7t8S6K3E3VV3qry33ZEWqQWqLq9xs4UmeNn268gFmZ6mdWWvz22zjHbaQH9Qmsrg
    ports:
      - "5004:8080"
    depends_on:
      sqlserver:
        condition: service_started
    networks:
      - imidus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: imidus-adminer
    ports:
      - "8080:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=sqlserver
    depends_on:
      - sqlserver
    networks:
      - imidus-network

volumes:
  sqlserver-data:

networks:
  imidus-network:
    driver: bridge
