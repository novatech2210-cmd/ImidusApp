workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: src/mobile/ImidusCustomerApp
    environment:
      node: 20
      ruby: 3.2.2
      vars:
        BUNDLE_ID: "com.imidus.customer"
        XCODE_WORKSPACE: "ImidusCustomerApp.xcworkspace"
        XCODE_SCHEME: "ImidusCustomerApp"
        # The following variables should be added in the Codemagic UI (Variable Groups)
        # Marked as 'Secure' to hide their values.
        # IOS_BUILD_CERTIFICATE_BASE64: <base64_string>
        # IOS_CERTIFICATE_PASSWORD: <password>
        # IOS_KEYCHAIN_PASSWORD: <password>
        # IOS_PROVISIONING_PROFILE_BASE64: <base64_string>
        # FASTLANE_TEAM_ID: <team_id>
    scripts:
      - name: Install dependencies
        script: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Setup Keychain and Import Certificates
        script: |
          # Mimic GHA keychain setup for Fastlane compatibility
          KEYCHAIN_PATH=$HOME/Library/Keychains/app-signing.keychain-db
          CERTIFICATE_PATH=$HOME/build_certificate.p12
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo -n "$IOS_BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          mkdir -p "$PP_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH/profile.mobileprovision"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
      - name: Install CocoaPods
        script: |
          cd ios && bundle exec pod install --repo-update
      - name: Build and Export IPA
        script: |
          cd ios && bundle exec fastlane build_production
    artifacts:
      - src/mobile/ImidusCustomerApp/ios/build/*.ipa
    publishing:
      email:
        recipients:
          - novatech2210@gmail.com
