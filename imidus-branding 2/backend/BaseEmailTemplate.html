<!--
  IMIDUS Technologies – Branded Email Template
  Path: IntegrationService.API/Templates/Email/BaseEmailTemplate.html
  Used for: order confirmations, loyalty updates, birthday rewards, push marketing.

  Replace {{PLACEHOLDERS}} with actual values in the EmailService.
  Tested at 600px width (Gmail, Outlook, Apple Mail).
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>{{EMAIL_SUBJECT}} – Imidus Technologies</title>
    <style>
      /* Email client resets */
      body,
      table,
      td,
      a {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      table,
      td {
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
      }
      img {
        -ms-interpolation-mode: bicubic;
        border: 0;
        outline: none;
        text-decoration: none;
      }
      body {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
      }

      /* Brand tokens */
      .brand-blue {
        color: #1e5aa8;
      }
      .brand-gold {
        color: #d4af37;
      }
      .bg-blue {
        background-color: #1e5aa8;
      }
      .bg-dark {
        background-color: #1a1a2e;
      }
      .bg-gold {
        background-color: #d4af37;
      }
      .bg-light-gold {
        background-color: #fdf6e3;
      }

      /* Buttons */
      .btn {
        display: inline-block;
        padding: 12px 28px;
        border-radius: 8px;
        font-family: Arial, sans-serif;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        text-align: center;
        letter-spacing: 0.5px;
      }
      .btn-gold {
        background-color: #d4af37;
        color: #222222 !important;
      }
      .btn-blue {
        background-color: #1e5aa8;
        color: #ffffff !important;
      }

      @media (max-width: 600px) {
        .wrapper {
          padding: 12px !important;
        }
        .content-block {
          padding: 20px 16px !important;
        }
      }
    </style>
  </head>
  <body style="background-color: #f5f5f5; margin: 0; padding: 0">
    <!-- Outer wrapper -->
    <table width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr>
        <td align="center" style="padding: 24px 12px" class="wrapper">
          <!-- Email container -->
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="
              max-width: 600px;
              width: 100%;
              background: #ffffff;
              border-radius: 12px;
              overflow: hidden;
              box-shadow: 0 4px 16px rgba(26, 26, 46, 0.12);
            "
          >
            <!-- ── HEADER: brand blue + gradient logo ── -->
            <tr>
              <td
                style="
                  background-color: #1e5aa8;
                  padding: 24px 32px;
                  text-align: center;
                "
              >
                <!-- Logo banner -->
                <img
                  src="{{LOGO_BLUE_BANNER_URL}}"
                  alt="Imidus Technologies"
                  width="480"
                  height="157"
                  style="max-width: 100%; height: auto"
                />

                <!-- Gold divider line -->
                <div
                  style="
                    height: 3px;
                    background: #d4af37;
                    margin-top: 20px;
                    border-radius: 2px;
                  "
                ></div>
              </td>
            </tr>

            <!-- ── BODY ── -->
            <tr>
              <td style="padding: 32px 32px 24px" class="content-block">
                <!-- Greeting -->
                <p
                  style="
                    font-family: Arial, sans-serif;
                    font-size: 22px;
                    font-weight: 700;
                    color: #1e5aa8;
                    margin: 0 0 8px;
                  "
                >
                  {{GREETING}},
                </p>
                <p
                  style="
                    font-family: Arial, sans-serif;
                    font-size: 15px;
                    color: #222222;
                    line-height: 1.6;
                    margin: 0 0 24px;
                  "
                >
                  {{EMAIL_INTRO_TEXT}}
                </p>

                <!-- ── Order summary block (conditional) ── -->
                <table
                  width="100%"
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                  style="
                    background: #f5f5f5;
                    border-radius: 8px;
                    overflow: hidden;
                    margin-bottom: 24px;
                  "
                >
                  <tr>
                    <td style="background: #1e5aa8; padding: 10px 16px">
                      <span
                        style="
                          font-family: Arial, sans-serif;
                          font-size: 12px;
                          font-weight: 700;
                          color: #ffffff;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                        "
                      >
                        {{BLOCK_TITLE}}
                      </span>
                    </td>
                  </tr>
                  <tr>
                    <td style="padding: 16px">{{BLOCK_CONTENT}}</td>
                  </tr>
                </table>

                <!-- ── CTA button ── -->
                <table
                  cellpadding="0"
                  cellspacing="0"
                  border="0"
                  style="margin: 0 auto"
                >
                  <tr>
                    <td align="center">
                      <a
                        href="{{CTA_URL}}"
                        class="btn btn-gold"
                        style="
                          background-color: #d4af37;
                          color: #222222;
                          font-family: Arial, sans-serif;
                          font-size: 15px;
                          font-weight: 700;
                          text-decoration: none;
                          display: inline-block;
                          padding: 13px 32px;
                          border-radius: 8px;
                          letter-spacing: 0.5px;
                        "
                      >
                        {{CTA_LABEL}}
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- ── Loyalty points strip (conditional) ── -->
            <tr>
              <td
                style="
                  background: #fdf6e3;
                  border-top: 2px solid #d4af37;
                  border-bottom: 2px solid #d4af37;
                  padding: 16px 32px;
                "
              >
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td>
                      <p
                        style="
                          font-family: Arial, sans-serif;
                          font-size: 11px;
                          font-weight: 700;
                          color: #888888;
                          text-transform: uppercase;
                          letter-spacing: 1px;
                          margin: 0 0 4px;
                        "
                      >
                        Your Loyalty Points
                      </p>
                      <p
                        style="
                          font-family: Arial, sans-serif;
                          font-size: 28px;
                          font-weight: 700;
                          color: #d4af37;
                          margin: 0;
                        "
                      >
                        {{LOYALTY_POINTS}} pts
                      </p>
                    </td>
                    <td align="right" valign="middle">
                      <img
                        src="{{LOGO_TRIANGLE_URL}}"
                        alt=""
                        width="48"
                        height="48"
                        style="opacity: 0.7"
                      />
                    </td>
                  </tr>
                </table>
              </td>
            </tr>

            <!-- ── FOOTER ── -->
            <tr>
              <td style="background-color: #1a1a2e; padding: 20px 32px">
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                  <tr>
                    <td>
                      <img
                        src="{{LOGO_COMPACT_URL}}"
                        alt="Imidus Technologies"
                        width="80"
                        height="27"
                        style="opacity: 0.6; margin-bottom: 10px"
                      />
                      <p
                        style="
                          font-family: Arial, sans-serif;
                          font-size: 11px;
                          color: rgba(255, 255, 255, 0.4);
                          margin: 0 0 4px;
                        "
                      >
                        © {{YEAR}} Imidus Technologies Inc. All rights reserved.
                      </p>
                      <p
                        style="
                          font-family: Arial, sans-serif;
                          font-size: 11px;
                          color: rgba(255, 255, 255, 0.3);
                          margin: 0;
                        "
                      >
                        You received this because you have an account with us.
                        <a
                          href="{{UNSUBSCRIBE_URL}}"
                          style="color: #d4af37; text-decoration: underline"
                          >Unsubscribe</a
                        >
                      </p>
                    </td>
                    <td align="right" valign="bottom">
                      <p
                        style="
                          font-family: Arial, sans-serif;
                          font-size: 10px;
                          color: rgba(255, 255, 255, 0.2);
                          margin: 0;
                        "
                      >
                        Built by Novatech
                      </p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
          <!-- /Email container -->
        </td>
      </tr>
    </table>
  </body>
</html>
