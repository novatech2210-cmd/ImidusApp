workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: src/mobile/ImidusCustomerApp
    
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    
    environment:
      node: 20
      ruby: 3.2.2
      vars:
        BUNDLE_ID: "com.imidus.customer"
        XCODE_WORKSPACE: "ImidusCustomerApp.xcworkspace"
        XCODE_SCHEME: "ImidusCustomerApp"
        CI: "true"
    
    scripts:
      - name: Install dependencies
        script: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate
          pnpm install --frozen-lockfile
          
          echo "✅ Node dependencies installed"
          pnpm list | grep react-native-svg || echo "✅ react-native-svg not present (expected)"
      
      - name: Setup Keychain and Import Certificates
        script: |
          KEYCHAIN_PATH=$HOME/Library/Keychains/app-signing.keychain-db
          CERTIFICATE_PATH=$HOME/build_certificate.p12
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo -n "$IOS_BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          mkdir -p "$PP_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH/profile.mobileprovision"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          
          echo "✅ Keychain and certificates configured"
      
      - name: Install Ruby dependencies and CocoaPods
        script: |
          cd ios
          
          # Install bundler if not present
          gem install bundler --no-document
          
          # Install gems (including CocoaPods) from Gemfile
          bundle install
          
          echo "✅ Ruby gems installed"
          bundle exec pod --version
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          bundle exec pod install --repo-update
          
          echo "✅ CocoaPods installation complete"
      
      - name: Build and Export IPA
        script: |
          cd ios
          export GITHUB_RUN_NUMBER=$CM_BUILD_ID
          bundle exec fastlane build_production
          
          echo "✅ IPA built successfully"
      
      - name: Upload to S3
        script: |
          if [ -f ios/build/ImidusCustomerApp.ipa ]; then
            aws s3 cp ios/build/ImidusCustomerApp.ipa \
              s3://inirestaurant/novatech/mobile/ios/ImidusCustomerApp-$CM_TAG.ipa \
              --metadata "build-id=$CM_BUILD_ID,commit=$CM_COMMIT"
            echo "✅ IPA uploaded to S3"
          else
            echo "❌ IPA not found"
            exit 1
          fi
    
    artifacts:
      - ios/build/*.ipa
    
    publishing:
      email:
        recipients:
          - novatech2210@gmail.com
        notify:
          success: true
          failure: true
