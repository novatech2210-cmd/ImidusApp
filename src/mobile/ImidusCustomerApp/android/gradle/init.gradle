// Provide React Native Gradle Plugin version to all subprojects
rootProject {
    buildscript {
        repositories {
            google()
            mavenCentral()
            maven {
                url = uri("../node_modules/@react-native/gradle-plugin/maven")
            }
        }
    }
}

allprojects { project ->
    if (project.buildscript?.configurations) {
        project.buildscript.repositories {
            google()
            mavenCentral()
            maven {
                url = uri("../node_modules/@react-native/gradle-plugin/maven")
            }
        }

        // For projects that have buildscript classpath configuration
        try {
            project.buildscript.configurations.classpath {
                resolutionStrategy {
                    eachDependency { details ->
                        if (details.requested.group == 'com.facebook.react' &&
                            details.requested.name == 'react-native-gradle-plugin' &&
                            !details.requested.version) {
                            details.useVersion "0.74.0"
                        }
                    }
                }
            }
        } catch (Exception e) {
            // Skip if configuration doesn't exist
        }
    }
}
